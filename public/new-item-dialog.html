<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#eee}
.d{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:10px 16px}
.t{font-size:15px;font-weight:700;margin-bottom:2px}
.n{font-size:12px;color:#aaa;margin-bottom:10px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
input{width:120px;height:34px;background:#0f3460;border:2px solid rgba(255,255,255,.2);border-radius:8px;color:#f5a623;font-size:20px;font-weight:700;text-align:center;outline:none;margin-bottom:10px}
input:focus{border-color:#f5a623}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
.b{display:flex;gap:10px}
button{padding:7px 20px;border-radius:6px;font-size:13px;cursor:pointer;border:none}
.s{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#aaa}
.s:hover{background:rgba(255,255,255,.15)}
.c{background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;font-weight:600}
.c:hover{box-shadow:0 2px 8px rgba(233,69,96,.4)}
</style>
</head>
<body>
<div class="d">
  <div class="t" id="title">设置先攻</div>
  <div class="n" id="name"></div>
  <input type="number" id="val" placeholder="先攻值" autofocus>
  <div class="b">
    <button class="s" id="skip">跳过</button>
    <button class="c" id="add">添加</button>
  </div>
</div>
<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3.1.0";

const p = new URLSearchParams(location.search);
const itemId = p.get("itemId");
const itemName = p.get("itemName") || "";
const lang = p.get("lang") || "zh";
const isZh = lang === "zh";
const MODAL_ID = "com.initiative-tracker/new-item-dialog";
const META_KEY = "com.initiative-tracker/data";

document.getElementById("title").textContent = isZh ? "设置先攻" : "Set Initiative";
document.getElementById("name").textContent = itemName || (isZh ? "新角色" : "New Character");
document.getElementById("skip").textContent = isZh ? "跳过" : "Skip";
document.getElementById("add").textContent = isZh ? "添加" : "Add";
document.getElementById("val").placeholder = isZh ? "先攻值" : "Initiative";

OBR.onReady(() => {
  const input = document.getElementById("val");
  input.focus();

  const submit = async () => {
    const v = parseFloat(input.value);
    if (isNaN(v)) return;
    await OBR.scene.items.updateItems([itemId], items => {
      for (const i of items) i.metadata[META_KEY] = { count: v, active: false };
    });
    OBR.modal.close(MODAL_ID);
  };

  document.getElementById("add").onclick = submit;
  document.getElementById("skip").onclick = () => OBR.modal.close(MODAL_ID);
  input.onkeydown = e => { if(e.key==="Enter") submit(); if(e.key==="Escape") OBR.modal.close(MODAL_ID); };
});
</script>
</body>
</html>
